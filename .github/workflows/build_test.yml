name: Build and Test

on:
  pull_request:
    branches:
      - main
      - prep-**
  workflow_dispatch:
    inputs:
      pr-number:
        type: number
        required: true
        description: "Pull request number to run the tests on"
      commit-sha:
        type: string
        required: true
        description: "Last commit SHA in the pull request"

jobs:
  verify-test-run:
    runs-on: ubuntu-latest
    outputs:
      got-testable-changes: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.changes.outputs.run_tests }}
    steps:
      - name: Validate head commit SHA
        id: validate-sha
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr-number }}
          COMMIT_SHA: ${{ inputs.commit-sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Fetching details for PR #$PR_NUMBER..."

          # Fetch PR head SHA
          ACTUAL_SHA=$(gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json headRefOid \
            --jq '.headRefOid')

          echo "Actual Head SHA: $ACTUAL_SHA"
          echo "Expected SHA:    $COMMIT_SHA"

          # Validate head commit SHA
          if [ "$ACTUAL_SHA" != "$COMMIT_SHA" ]; then
            echo "::error::Security Check Failed! The PR head commit ($ACTUAL_SHA) does not match the reviewed commit ($COMMIT_SHA)."
            exit 1
          fi

          echo "Validation passed!"

      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Filter changed files
        uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            run_tests:
              - '.github/**'
              - 'src/**'
              - 'tests/**'
              - 'tox.ini'
              - 'setup.cfg'
              - 'pyproject.toml'

  lint:
    needs: verify-test-run
    if: |
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    name: Check linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade and install tools
        run: |
          python -m pip install -U uv
          python -m uv pip install -U 'virtualenv<21.0' hatch
          python -m hatch env create default

      - name: Set PY
        run: echo "PY=$(hatch run gh-cache-sum)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run lint checks
        run: hatch run check

  build-install:
    needs: [verify-test-run, lint]
    if: |
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    name: Test package build and installation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - hatch-env: default
            python-version: "3.13"
          - hatch-env: sa21
            python-version: "3.12"
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Setup up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade and install tools
        run: |
          python -m pip install -U uv
          python -m uv pip install -U 'virtualenv<21.0' hatch

      - name: Build package
        run: |
          python -m hatch -e ${{ matrix.hatch-env }} build --clean

      - name: Install and check import
        run: |
          hatch run ${{ matrix.hatch-env }}:pip install dist/snowflake_sqlalchemy-*.whl --force-reinstall --no-deps
          hatch run ${{ matrix.hatch-env }}:check-import

  test-dialect:
    needs: [verify-test-run, lint, build-install]
    if: |
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    name: Test dialect ${{ matrix.os }}-3.13-${{ matrix.cloud-provider }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        cloud-provider: [aws, azure, gcp]
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip and prepare environment
        run: |
          python -m pip install -U uv
          python -m uv pip install -U 'virtualenv<21.0' hatch
          python -m hatch env create default

      - name: Setup parameters file
        shell: bash
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        run: |
          printf "%s" "$PARAMETERS_SECRET" | gpg --quiet --batch --yes \
            --decrypt \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --output tests/parameters.py \
            .github/workflows/parameters/parameters_${{ matrix.cloud-provider }}.py.gpg

      - name: Run test for AWS
        if: matrix.cloud-provider == 'aws'
        run: hatch run test-dialect-aws

      - name: Run tests
        run: hatch run test-dialect

      - uses: actions/upload-artifact@v4
        with:
          name: coverage.xml_dialect-${{ matrix.os }}-3.13-${{ matrix.cloud-provider }}
          path: |
            ./coverage.xml

  test-dialect-compatibility:
    needs: [verify-test-run, lint, build-install]
    if: |
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    name: Test dialect compatibility ${{ matrix.os }}-3.13-${{ matrix.cloud-provider }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        cloud-provider: [aws, azure, gcp]
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip and install hatch
        run: |
          python -m pip install -U uv
          python -m uv pip install -U 'virtualenv<21.0' hatch
          python -m hatch env create default

      - name: Setup parameters file
        shell: bash
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        run: |
          printf "%s" "$PARAMETERS_SECRET" | gpg --quiet --batch --yes \
            --decrypt \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --output tests/parameters.py \
            .github/workflows/parameters/parameters_${{ matrix.cloud-provider }}.py.gpg

      - name: Run tests
        run: hatch run test-dialect-compatibility

      - uses: actions/upload-artifact@v4
        with:
          name: coverage.xml_dialect-compatibility-${{ matrix.os }}-3.13-${{ matrix.cloud-provider }}
          path: |
            ./coverage.xml

  test-dialect-v21:
    name: Test dialect sa21 ${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.cloud-provider }}
    needs: [lint, build-install]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        python-version: ["3.12"]
        cloud-provider: [aws, azure, gcp]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup parameters file
        shell: bash
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        run: |
          printf "%s" "$PARAMETERS_SECRET" | gpg --quiet --batch --yes \
            --decrypt \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --output tests/parameters.py \
            .github/workflows/parameters/parameters_${{ matrix.cloud-provider }}.py.gpg
      - name: Upgrade pip and install hatch
        run: |
          python -m pip install -U uv
          python -m uv pip install -U hatch
          python -m hatch env create sa21
      - name: Verify SQLAlchemy version
        run: hatch run sa21:python -c "import sqlalchemy; print(sqlalchemy.__version__); assert sqlalchemy.__version__.startswith('2.1'), f'Expected SQLAlchemy 2.1.x, got {{sqlalchemy.__version__}}'"
      - name: Run test for AWS
        run: hatch run sa21:test-dialect-aws
        if: matrix.cloud-provider == 'aws'
      - name: Run tests
        run: hatch run sa21:test-dialect
      - uses: actions/upload-artifact@v4
        with:
          name: coverage.xml_dialect-sa21-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.cloud-provider }}
          path: |
            ./coverage.xml

  test-dialect-compatibility-v21:
    name: Test dialect sa21 compatibility ${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.cloud-provider }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        python-version: ["3.12"]
        cloud-provider: [aws, azure, gcp]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip and install hatch
        run: |
          python -m pip install -U uv
          python -m uv pip install -U hatch
          python -m hatch env create sa21
      - name: Verify SQLAlchemy version
        run: hatch run sa21:python -c "import sqlalchemy; print(sqlalchemy.__version__); assert sqlalchemy.__version__.startswith('2.1'), f'Expected SQLAlchemy 2.1.x, got {{sqlalchemy.__version__}}'"
      - name: Setup parameters file
        shell: bash
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        run: |
          printf "%s" "$PARAMETERS_SECRET" | gpg --quiet --batch --yes \
            --decrypt \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --output tests/parameters.py \
            .github/workflows/parameters/parameters_${{ matrix.cloud-provider }}.py.gpg
      - name: Run tests
        run: hatch run sa21:test-dialect-compatibility
      - uses: actions/upload-artifact@v4
        with:
          name: coverage.xml_dialect-sa21-compatibility-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.cloud-provider }}
          path: |
            ./coverage.xml

  combine-coverage:
    needs: [verify-test-run, lint, test-dialect, test-dialect-compatibility, test-dialect-v21, test-dialect-compatibility-v21]
    name: Combine coverage
    if: |
      !cancelled() && (success() || failure()) &&
      (
        (github.event_name == 'workflow_dispatch') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare environment
        run: |
          python -m pip install -U uv
          python -m uv pip install -U 'virtualenv<21.0' hatch
          hatch env create default

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Combine coverage files
        run: |
          hatch run coverage combine -a artifacts/coverage.xml_*/coverage.xml
          hatch run coverage report -m

      - name: Store coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage.xml
          path: coverage.xml

      - name: Upload to codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          env_vars: OS,PYTHON
          fail_ci_if_error: false
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          url: https://snowflake.codecov.io/
