name: Build and Test

on:
  pull_request:
    branches:
      - main
      - prep-**
  workflow_dispatch:
    inputs:
      pr-number:
        type: number
        required: true
        description: "Pull request number to run the tests on"
      commit-sha:
        type: string
        required: true
        description: "Last commit SHA in the pull request"

permissions:
  contents: read

jobs:
  verify-test-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      got-testable-changes: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.changes.outputs.run_tests }}
    steps:
      - name: Validate head commit SHA
        id: validate-sha
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr-number }}
          COMMIT_SHA: ${{ inputs.commit-sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Fetching details for PR #$PR_NUMBER..."

          # Fetch PR head SHA
          ACTUAL_SHA=$(gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json headRefOid \
            --jq '.headRefOid')

          echo "Actual Head SHA: $ACTUAL_SHA"
          echo "Expected SHA:    $COMMIT_SHA"

          # Validate head commit SHA
          if [ "$ACTUAL_SHA" != "$COMMIT_SHA" ]; then
            echo "::error::Security Check Failed! The PR head commit ($ACTUAL_SHA) does not match the reviewed commit ($COMMIT_SHA)."
            exit 1
          fi

          echo "Validation passed!"

      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Filter changed files
        uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            run_tests:
              - '.github/**'
              - 'src/**'
              - 'tests/**'
              - 'tox.ini'
              - 'setup.cfg'
              - 'pyproject.toml'

  lint:
    needs: verify-test-run
    if: |
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.verify-test-run.result == 'success') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    name: Check linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade and install tools
        run: |
          python -m pip install -U uv
          python -m uv pip install -U 'virtualenv<21.0' hatch
          python -m hatch env create default

      - name: Set PY
        run: echo "PY=$(hatch run gh-cache-sum)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run lint checks
        run: hatch run check

  build-install:
    needs: [verify-test-run, lint]
    if: |
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.verify-test-run.result == 'success') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    name: Test package build and installation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - hatch-env: default
            python-version: "3.9"
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
          persist-credentials: false

      - name: Setup up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade and install tools
        run: |
          python -m pip install -U uv
          python -m uv pip install -U 'virtualenv<21.0' hatch

      - name: Build package
        run: |
          python -m hatch -e ${{ matrix.hatch-env }} build --clean

      - name: Install and check import
        run: |
          python -m uv pip install dist/snowflake_sqlalchemy-*.whl
          python -c "import snowflake.sqlalchemy; print(snowflake.sqlalchemy.__version__)"

  cloud-tests:
    needs: [verify-test-run, lint, build-install]
    if: |
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.verify-test-run.result == 'success') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          needs.verify-test-run.outputs.got-testable-changes == 'true'
        )
      )
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        cloud_provider: [aws, azure, gcp]
    uses: ./.github/workflows/build_test_cloud.yml
    with:
      cloud_provider: ${{ matrix.cloud_provider }}
      commit-sha: ${{ github.event_name == 'workflow_dispatch' && inputs.commit-sha || '' }}
    secrets: inherit
