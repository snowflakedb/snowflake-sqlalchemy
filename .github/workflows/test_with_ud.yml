name: Test with Universal Driver

on:
  push:
    branches:
      - universal-driver
  repository_dispatch:
    types: [test-ud]
  workflow_dispatch:
    inputs:
      ud_ref:
        description: "Git ref (branch/tag/SHA) of snowflakedb/universal-driver"
        required: false
        default: "main"
        type: string
      cloud_provider:
        description: "Cloud provider for test parameters"
        required: false
        default: "aws"
        type: choice
        options:
          - aws
          - azure
          - gcp

env:
  UD_REF: ${{ github.event.client_payload.ud_ref || inputs.ud_ref || 'main' }}
  CLOUD_PROVIDER: ${{ github.event.client_payload.cloud_provider || inputs.cloud_provider || 'aws' }}

jobs:
  test-dialect-ud:
    name: Test dialect with UD (${{ github.event.client_payload.cloud_provider || inputs.cloud_provider || 'aws' }}, ud@${{ github.event.client_payload.ud_ref || inputs.ud_ref || 'main' }})
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize ref for artifact name
        run: echo "UD_REF_SAFE=${UD_REF//\//-}" >> $GITHUB_ENV

      - name: Checkout snowflake-sqlalchemy
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ssa_ref || github.ref }}
          persist-credentials: false

      - name: Checkout universal-driver
        uses: actions/checkout@v4
        with:
          repository: snowflakedb/universal-driver
          ref: ${{ env.UD_REF }}
          path: universal-driver
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup test parameters
        shell: bash
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        run: |
          printf "%s" "$PARAMETERS_SECRET" | gpg --quiet --batch --yes \
            --decrypt \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --output tests/parameters.py \
            .github/workflows/parameters/parameters_${{ env.CLOUD_PROVIDER }}.py.gpg

      - name: Install base tools
        run: python -m pip install -U pip uv

      - name: Patch pyproject.toml to use UD connector
        run: |
          sed -i 's/snowflake-connector-python<5.0.0/snowflake-connector-python-ud/' pyproject.toml
          sed -i 's/snowflake-connector-python\[pandas\]/snowflake-connector-python-ud[pandas]/' pyproject.toml

      - name: Build and install universal-driver connector
        working-directory: universal-driver/python
        run: python -m pip install .

      - name: Install snowflake-sqlalchemy with dev dependencies
        run: python -m pip install -e ".[development]"

      - name: Verify installation
        run: |
          python -c "
          import snowflake.connector
          print(f'Connector: snowflake-connector-python-ud {snowflake.connector.__version__}')
          import snowflake.sqlalchemy
          print(f'SQLAlchemy dialect: {snowflake.sqlalchemy.__version__}')
          "

      - name: Run dialect tests
        run: |
          pytest tests/ --ignore=tests/sqlalchemy_test_suite -ra -vvv --tb=short -n16 --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ud-${{ env.CLOUD_PROVIDER }}-${{ env.UD_REF_SAFE }}
          path: junit.xml
